name: CI — Build & Integration Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1 ── Checkout source code
      - name: Checkout
        uses: actions/checkout@v4

      # 2 ── Set up JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3 ── Make Maven wrapper executable
      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      # 4 ── Compile
      - name: Build
        run: ./mvnw compile --no-transfer-progress

      # 5 ── Unit tests (surefire) + Integration tests (failsafe)
      - name: Run tests
        run: ./mvnw verify --no-transfer-progress

      # 6 ── Publish test report (runs even if tests fail)
      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/target/surefire-reports/TEST-*.xml,**/target/failsafe-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false

      # 7 ── Upload XML reports as downloadable artifact
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/TEST-*.xml
            **/target/failsafe-reports/TEST-*.xml
          retention-days: 7

      # 8 ── Generate coverage report and badge
      - name: Generate JaCoCo Badge
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: "**/jacoco.csv"
