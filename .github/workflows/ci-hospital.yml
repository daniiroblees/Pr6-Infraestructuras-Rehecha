name: CI Gestion de Hospitales

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # PERMISOS EJECUCION
      - name: Permisos a mvnw
        run: chmod +x mvnw

      # b) COMPILAR PROYECTO SPRINGBOOT
      - name: Compilar proyecto
        run: ./mvnw compile --no-transfer-progress

      # c) EJECUTAR TESTS INTEGRACION
      - name: Tests integracion
        run: ./mvnw verify --no-transfer-progress

      # d) INFORME DE RESULTADOS
      - name: Reporte de Tests
        uses: dorny/test-reporter@v1
        if: success() || failure() # Se ejecuta aunque fallen los tests para ver qué ha fallado
        with:
          name: Informe de Pruebas Unitarias e Integración
          path: 'target/surefire-reports/TEST-*.xml,target/failsafe-reports/TEST-*.xml'
          reporter: java-junit

      # e) Badge de cobertura
      - name: Generar jacoco badge
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: target/site/jacoco/jacoco.csv